name: ByteBridge CI/CD Build pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate-and-compile:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Node.js v22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install packages dependencies
      run: npm ci

    - name: Run code linter
      run: npm run lint

    - name: Compile and bundle assets (Production Build)
      run: npm run build

    - name: Verify compiled artifact output
      run: |
        test -f dist/server.cjs && echo "✔ Compiled backend server exists"
        test -f dist/index.html && echo "✔ Compiled frontend HTML exists"
