<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Sleek tech background container -->
  <rect width="32" height="32" rx="8" fill="#05070c"/>
  
  <!-- Outer glowing bridge arch -->
  <path d="M6 21V12.5C6 9.46 8.46 7 11.5 7H20.5C23.54 7 26 9.46 26 12.5V21" stroke="url(#cyanGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Connection bridge path / dashed data line -->
  <path d="M9 16.5H23" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="2.5 1.5" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Connection nodes (Bytes) -->
  <circle cx="9" cy="16.5" r="2.5" fill="#38bdf8" />
  <circle cx="16" cy="16.5" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="23" cy="16.5" r="2.5" fill="#38bdf8" />
  
  <!-- Bottom stabilizer base line representing connection surface -->
  <path d="M5 24H27" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
</svg>
